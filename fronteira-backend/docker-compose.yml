version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fronteira_postgres
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: fronteira_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d fronteira_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fronteira_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend node (opcional — pode rodar local com npm run dev)
  # backend:
  #   build: .
  #   container_name: fronteira_backend
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgresql://usuario:senha@postgres:5432/fronteira_dev
  #     REDIS_URL: redis://redis:6379
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules

volumes:
  postgres_data:
  redis_data:
